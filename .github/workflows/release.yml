name: Release

# Push a tag (e.g. `git tag 0.13.0 && git push --tags`) to build the prebuilt
# binaries and publish them as a GitHub release. The asset names match what
# install.sh downloads: as-tree-<linux|macos>-<x86_64|aarch64>.tar.gz
on:
  push:
    tags:
      - '*'
  workflow_dispatch: {}

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu,  os: ubuntu-latest, asset: as-tree-linux-x86_64.tar.gz }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-latest, asset: as-tree-linux-aarch64.tar.gz, linker: gcc-aarch64-linux-gnu }
          - { target: x86_64-apple-darwin,       os: macos-latest,  asset: as-tree-macos-x86_64.tar.gz }
          - { target: aarch64-apple-darwin,      os: macos-latest,  asset: as-tree-macos-aarch64.tar.gz }
    steps:
      - uses: actions/checkout@v4

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross linker
        if: ${{ matrix.linker != '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.linker }}

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: tar -czf "${{ matrix.asset }}" -C "target/${{ matrix.target }}/release" as-tree

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create or update the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/*.tar.gz \
            --repo "${GITHUB_REPOSITORY}" --title "${GITHUB_REF_NAME}" --generate-notes \
          || gh release upload "${GITHUB_REF_NAME}" dist/*.tar.gz \
            --repo "${GITHUB_REPOSITORY}" --clobber
